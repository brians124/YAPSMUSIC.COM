<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | System Portal</title>
    <link rel="stylesheet" href="forgot.css">
    <script src="script.js" defer></script>
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="glass-container">
        <form id="forgotPasswordForm" class="forgot-card">
            <div class="header">
                <i class='bx bx-lock-open-alt icon-header'></i>
                <h2>Forgot Password?</h2>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="email" placeholder="e.g. brian@example.com" required>
                </div>
            </div>

            <button type="submit" class="reset-btn">Send Reset Link</button>

            <div class="footer">
                <a href="signup.html" class="back-link"><i class='bx bx-arrow-back'></i> Back to Login</a>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
